server:
  port: 8120

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

pressure:
  budget: ${PRESSURE_BUDGET:8}
  threshold:
    admit: ${PRESSURE_ADMIT_THRESHOLD:30.0}
    degrade: ${PRESSURE_DEGRADE_THRESHOLD:20.0}
  score:
    tier-weight: ${PRESSURE_TIER_WEIGHT:30.0}
    cost-penalty: ${PRESSURE_COST_PENALTY:1.0}
    load-penalty: ${PRESSURE_LOAD_PENALTY:50.0}
  shed:
    retry-after-ms: ${PRESSURE_RETRY_AFTER_MS:200}
